version: '3'

services:
  database:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: P@ssw02dInD3v3l0pm3nt
      POSTGRES_USER: ret2shell
      POSTGRES_DB: ret2shell
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  cache:
    image: redis:7
    restart: always
    volumes:
      - redis:/data
    ports:
      - "6379:6379"

volumes:
  postgres:
  redis:

