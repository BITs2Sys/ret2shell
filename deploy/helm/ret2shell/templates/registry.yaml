{{- if eq .Values.registry.mode "internal" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ret2shell.registryName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
data:
  config.yml: |
    version: 0.1
    log:
      fields:
        service: registry
    storage:
      delete:
        enabled: true
      cache:
        blobdescriptor: inmemory
      filesystem:
        rootdirectory: /var/lib/registry
    http:
      addr: :{{ .Values.registry.service.port }}
      headers:
        X-Content-Type-Options: [nosniff]
      {{- if .Values.registry.metrics.enabled }}
      debug:
        addr: :{{ .Values.registry.metrics.port }}
        prometheus:
          enabled: true
          path: /metrics
      {{- end }}
    health:
      storagedriver:
        enabled: true
        interval: 10s
        threshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ret2shell.registryName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
    ret2shell.io/service-role: primary
  {{- with .Values.registry.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: registry
      port: {{ .Values.registry.service.port }}
      targetPort: registry
    {{- if .Values.registry.metrics.enabled }}
    - name: metrics
      port: {{ .Values.registry.metrics.port }}
      targetPort: metrics
    {{- end }}
  selector:
    {{- include "ret2shell.componentLabels" (dict "component" "registry" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}

{{- if .Values.registry.externalAccess.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ret2shell.registryName" . }}-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
    ret2shell.io/service-role: external
  {{- with .Values.registry.externalAccess.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.registry.externalAccess.serviceType }}
  ports:
    - name: registry
      port: {{ .Values.registry.service.port }}
      targetPort: registry
      {{- if eq .Values.registry.externalAccess.serviceType "NodePort" }}
      nodePort: {{ .Values.registry.externalAccess.nodePort }}
      {{- end }}
  selector:
    {{- include "ret2shell.componentLabels" (dict "component" "registry" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}
{{- end }}

{{- if and .Values.registry.persistence.enabled (not .Values.registry.persistence.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ret2shell.registryName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
spec:
  accessModes:
    - {{ .Values.registry.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.registry.persistence.size }}
  {{- $sc := include "ret2shell.storageClass" (dict "root" . "local" .Values.registry.persistence.storageClass) }}
  {{- if $sc }}
  storageClassName: {{ $sc }}
  {{- end }}
{{- end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ret2shell.registryName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
spec:
  replicas: {{ .Values.registry.replicaCount }}
  strategy:
    type: {{ .Values.registry.updateStrategy.type }}
    {{- if and (eq .Values.registry.updateStrategy.type "RollingUpdate") .Values.registry.updateStrategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml .Values.registry.updateStrategy.rollingUpdate | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "ret2shell.componentLabels" (dict "component" "registry" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ret2shell.componentLabels" (dict "component" "registry" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 8 }}
        {{- with .Values.registry.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.registry.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.registry.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: registry
          image: {{ include "ret2shell.image" .Values.registry.image }}
          imagePullPolicy: {{ .Values.registry.image.pullPolicy }}
          args:
            - serve
            - /etc/docker/registry/config.yml
          ports:
            - name: registry
              containerPort: {{ .Values.registry.service.port }}
            {{- if .Values.registry.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.registry.metrics.port }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/docker/registry/config.yml
              subPath: config.yml
            - name: data
              mountPath: /var/lib/registry
          {{- with .Values.registry.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ret2shell.registryName" . }}
        {{- if .Values.registry.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.registry.persistence.existingClaim }}
        {{- else if .Values.registry.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ret2shell.registryName" . }}
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.registry.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.registry.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.registry.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.registry.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- if .Values.registry.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ret2shell.registryName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
spec:
  selector:
    matchLabels:
      {{- include "ret2shell.componentLabels" (dict "component" "registry" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  {{- with .Values.registry.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.registry.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
{{- end }}

{{- if and .Values.registry.metrics.enabled .Values.registry.metrics.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ret2shell.registryName" . }}
  namespace: {{ default .Release.Namespace .Values.registry.metrics.serviceMonitor.namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: registry
    {{- with .Values.registry.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.registry.metrics.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "ret2shell.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: registry
      ret2shell.io/service-role: primary
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.registry.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.registry.metrics.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
