{{- if eq .Values.victoriaLogs.mode "internal" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ret2shell.victoriaLogsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-logs
    ret2shell.io/service-role: client
  {{- with .Values.victoriaLogs.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.victoriaLogs.service.port }}
      targetPort: http
  selector:
    {{- include "ret2shell.componentLabels" (dict "component" "victoria-logs" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ret2shell.victoriaLogsHeadlessName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-logs
    ret2shell.io/service-role: headless
spec:
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.victoriaLogs.service.port }}
      targetPort: http
  selector:
    {{- include "ret2shell.componentLabels" (dict "component" "victoria-logs" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ret2shell.victoriaLogsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-logs
spec:
  serviceName: {{ include "ret2shell.victoriaLogsHeadlessName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "ret2shell.componentLabels" (dict "component" "victoria-logs" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ret2shell.componentLabels" (dict "component" "victoria-logs" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 8 }}
        {{- with .Values.victoriaLogs.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.victoriaLogs.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.victoriaLogs.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: victoria-logs
          image: {{ include "ret2shell.image" .Values.victoriaLogs.image }}
          imagePullPolicy: {{ .Values.victoriaLogs.image.pullPolicy }}
          args:
            - --storageDataPath=/vlogs
          ports:
            - name: http
              containerPort: {{ .Values.victoriaLogs.service.port }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /vlogs
          {{- with .Values.victoriaLogs.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.victoriaLogs.persistence.existingClaim }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.victoriaLogs.persistence.existingClaim }}
      {{- else if not .Values.victoriaLogs.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      {{- with .Values.victoriaLogs.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriaLogs.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriaLogs.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriaLogs.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.victoriaLogs.persistence.enabled (not .Values.victoriaLogs.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "ret2shell.commonLabels" . | nindent 10 }}
          app.kubernetes.io/component: victoria-logs
      spec:
        accessModes:
          - {{ .Values.victoriaLogs.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.victoriaLogs.persistence.size }}
        {{- $sc := include "ret2shell.storageClass" (dict "root" . "local" .Values.victoriaLogs.persistence.storageClass) }}
        {{- if $sc }}
        storageClassName: {{ $sc }}
        {{- end }}
  {{- end }}

{{- if .Values.victoriaLogs.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ret2shell.victoriaLogsName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-logs
spec:
  selector:
    matchLabels:
      {{- include "ret2shell.componentLabels" (dict "component" "victoria-logs" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  {{- with .Values.victoriaLogs.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.victoriaLogs.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
{{- end }}

{{- if .Values.victoriaLogs.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ret2shell.victoriaLogsName" . }}
  namespace: {{ default .Release.Namespace .Values.victoriaLogs.serviceMonitor.namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-logs
    {{- with .Values.victoriaLogs.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.victoriaLogs.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "ret2shell.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: victoria-logs
      ret2shell.io/service-role: client
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.victoriaLogs.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.victoriaLogs.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
