{{- if eq .Values.postgresql.mode "internal" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ret2shell.postgresqlName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
stringData:
  username: {{ .Values.postgresql.auth.username | quote }}
  password: {{ .Values.postgresql.auth.password | quote }}
  database: {{ .Values.postgresql.auth.database | quote }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ret2shell.postgresqlName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    ret2shell.io/service-role: client
  {{- with .Values.postgresql.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgres
    {{- if .Values.postgresql.metrics.enabled }}
    - name: metrics
      port: {{ .Values.postgresql.metrics.port }}
      targetPort: metrics
    {{- end }}
  selector:
    {{- include "ret2shell.componentLabels" (dict "component" "postgresql" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ret2shell.postgresqlHeadlessName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    ret2shell.io/service-role: headless
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: {{ .Values.postgresql.service.port }}
      targetPort: postgres
  selector:
    {{- include "ret2shell.componentLabels" (dict "component" "postgresql" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 4 }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ret2shell.postgresqlName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "ret2shell.postgresqlHeadlessName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "ret2shell.componentLabels" (dict "component" "postgresql" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ret2shell.componentLabels" (dict "component" "postgresql" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 8 }}
        {{- with .Values.postgresql.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.postgresql.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- with .Values.postgresql.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: postgresql
          image: {{ include "ret2shell.image" .Values.postgresql.image }}
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ret2shell.postgresqlName" . }}
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ret2shell.postgresqlName" . }}
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "ret2shell.postgresqlName" . }}
                  key: database
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresql.service.port }}
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -h 127.0.0.1 -p {{ .Values.postgresql.service.port }} -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -h 127.0.0.1 -p {{ .Values.postgresql.service.port }} -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          {{- with .Values.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.postgresql.metrics.enabled }}
        - name: metrics
          image: {{ include "ret2shell.image" .Values.postgresql.metrics.image }}
          imagePullPolicy: {{ .Values.postgresql.metrics.image.pullPolicy }}
          env:
            - name: DATA_SOURCE_URI
              value: 127.0.0.1:{{ .Values.postgresql.service.port }}/postgres?sslmode=disable
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ret2shell.postgresqlName" . }}
                  key: username
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "ret2shell.postgresqlName" . }}
                  key: password
          ports:
            - name: metrics
              containerPort: {{ .Values.postgresql.metrics.port }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- with .Values.postgresql.metrics.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- if .Values.postgresql.persistence.existingClaim }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.postgresql.persistence.existingClaim }}
      {{- else if not .Values.postgresql.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      {{- with .Values.postgresql.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.postgresql.persistence.enabled (not .Values.postgresql.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "ret2shell.volumeLabels" . | nindent 10 }}
          app.kubernetes.io/component: postgresql
      spec:
        accessModes:
          - {{ .Values.postgresql.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
        {{- $sc := include "ret2shell.storageClass" (dict "root" . "local" .Values.postgresql.persistence.storageClass) }}
        {{- if $sc }}
        storageClassName: {{ $sc }}
        {{- end }}
  {{- end }}

{{- if .Values.postgresql.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ret2shell.postgresqlName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  selector:
    matchLabels:
      {{- include "ret2shell.componentLabels" (dict "component" "postgresql" "Chart" .Chart "Release" .Release "Values" .Values) | nindent 6 }}
  {{- with .Values.postgresql.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.postgresql.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
{{- end }}

{{- if and .Values.postgresql.metrics.enabled .Values.postgresql.metrics.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ret2shell.postgresqlName" . }}
  namespace: {{ default .Release.Namespace .Values.postgresql.metrics.serviceMonitor.namespace }}
  labels:
    {{- include "ret2shell.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
    {{- with .Values.postgresql.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.postgresql.metrics.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "ret2shell.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
      ret2shell.io/service-role: client
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.postgresql.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.postgresql.metrics.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
