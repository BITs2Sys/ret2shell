# Example overlay for operators who want richer observability and
# multi-replica settings where the bundled chart can safely support it.
#
# Notes:
# - NATS replicaCount>1 enables clustered routes automatically.
# - Valkey replication uses pod 0 as the primary and remaining pods as replicas.
# - On local single-node storage, apply deploy/k8s/storage-local-ha.example.yaml first.
# - Registry replicaCount>1 requires shared storage, for example an RWX PVC
#   or an existingClaim backed by shared storage. Do not use the default
#   local single-node PV layout for a multi-replica registry.
# - ServiceMonitor resources require the Prometheus Operator CRDs.

postgresql:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

valkey:
  architecture: replication
  replica:
    replicaCount: 2
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

nats:
  replicaCount: 3
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

registry:
  replicaCount: 2
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  persistence:
    accessMode: ReadWriteMany
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

victoriaLogs:
  serviceMonitor:
    enabled: true
